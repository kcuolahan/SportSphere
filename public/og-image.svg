  <text x="80" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#f97316" letter-spacing="3">AFL DISPOSAL ANALYTICS</text>
  <!-- Title -->
  <text x="80" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="68" font-weight="800" fill="#f0f0f0" letter-spacing="-3">SportSphere</text>
  <text x="80" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="400" fill="#555555">Australia's sharpest AFL disposal model</text>
  <!-- Stats row -->
  <g transform="translate(80, 310)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#f97316" letter-spacing="-2">59.0%</text>
    <text x="0" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#555555" letter-spacing="1">FILTERED WIN RATE</text>
